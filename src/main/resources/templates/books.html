<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <link
    type="text/css"
    rel="stylesheet"
    href="/css/bootstrap.min.css"
    th:href="@{/css/bootstrap.min.css}" />
  <head>
    <title>Kirjat</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  </head>
  <body>
    <h1>Kirjat</h1>
    <table class="table table-striped">
      <tr>
        <th>Nimi</th>
        <th>Kirjailija</th>
        <th>Julkaisuvuosi</th>
        <th>ISBN</th>
        <th>Hinta</th>
        <th>Kategoriat</th>
        <!--Alla olevat kaksi <th> elementtiä lisätty parantaakseen visuaalisuutta-->
        <th></th>
        <th></th>
      </tr>
      <div class="col-md-4" style="padding: 20px 0">
        <form th:action="@{/logout}" method="post">
          <input
            type="submit"
            value="Kirjaudu ulos"
            class="btn btn-sm btn-danger" />
          <h3>Käyttäjä: <span sec:authentication="name"></span></h3>
        </form>
      </div>
      <tr th:each="kirja : ${books}">
        <td th:text="${kirja.title}"></td>
        <td th:text="${kirja.author}"></td>
        <td th:text="${kirja.publicationYear}"></td>
        <td th:text="${kirja.isbn}"></td>
        <td th:text="${kirja.price}"></td>
        <td th:text="${kirja.category.name}"></td>

        <td sec:authorize="hasAuthority('ADMIN')">
          <a
            th:href="@{/deleteBook/{id}(id=${kirja.id})}"
            class="btn btn-danger"
            >Poista kirja</a
          >
        </td>

        <td sec:authorize="hasAuthority('ADMIN')">
          <a
            th:href="@{/editBook/{id}(id=${kirja.id})}"
            class="btn btn-warning">
            Muokkaa kirjan tietoja
          </a>
        </td>
      </tr>
    </table>
    <td sec:authorize="hasAuthority('ADMIN')">
      <a href="/addBook" class="btn btn-success">Lisää kirja</a>
    </td>
  </body>
</html>
