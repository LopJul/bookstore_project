<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <link
    type="text/css"
    rel="stylesheet"
    href="/css/bootstrap.min.css"
    th:href="@{/css/bootstrap.min.css}" />
  <head>
    <title>Kirjat</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  </head>
  <body>
    <h1>Kirjat</h1>
    <table class="table table-striped">
      <tr>
        <th>Nimi</th>
        <th>Kirjailija</th>
        <th>Julkaisuvuosi</th>
        <th>ISBN</th>
        <th>Hinta</th>
        <!--Alla olevat kaksi <th> elementtiä lisätty parantaakseen visuaalisuutta-->
        <th></th>
        <th></th>
      </tr>
      <tr th:each="kirja : ${books}">
        <td th:text="${kirja.title}"></td>
        <td th:text="${kirja.author}"></td>
        <td th:text="${kirja.publicationYear}"></td>
        <td th:text="${kirja.isbn}"></td>
        <td th:text="${kirja.price}"></td>

        <td>
          <a
            th:href="@{/deleteBook/{id}(id=${kirja.id})}"
            class="btn btn-danger"
            >Poista kirja</a
          >
        </td>
        <td>
          <a
            th:href="@{/editBook/{id}(id=${kirja.id})}"
            class="btn btn-warning">
            Muokkaa kirjan tietoja
          </a>
        </td>
      </tr>
    </table>
    <a href="/addBook" class="btn btn-success">Lisää kirja</a>
  </body>
</html>
